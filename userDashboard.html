<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>User Dashboard</title>
  <style>
    :root{
      --accent-1: #6a11cb;
      --accent-2: #2575fc;
      --card-bg: rgba(255,255,255,0.06);
      --glass: rgba(255,255,255,0.06);
      --glass-2: rgba(255,255,255,0.04);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.8);
      --btn-shadow: 0 8px 24px rgba(37,117,252,0.18);
    }

    html,body{
      height:100%;
      margin:0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      color:var(--text);
      background: radial-gradient(1200px 600px at 10% 10%, rgba(106,17,203,0.18), transparent 8%),
                  radial-gradient(1000px 500px at 90% 90%, rgba(37,117,252,0.12), transparent 10%),
                  linear-gradient(135deg, #0f172a 0%, #071029 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px;
      box-sizing:border-box;
    }

    .dashboard-card{
      width:100%;
      max-width:920px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border-radius:16px;
      padding:28px;
      box-shadow: 0 10px 40px rgba(2,6,23,0.6);
      border: 1px solid rgba(255,255,255,0.04);
      display:grid;
      grid-template-columns: 1fr 320px;
      gap:24px;
      align-items:center;
      backdrop-filter: blur(6px) saturate(120%);
    }

    /* Left area */
    .left {
      padding: 8px 12px;
    }

    #dashboardGreeting{
      margin:0 0 12px 0;
      font-size:28px;
      letter-spacing: -0.4px;
      color: #fff;
    }

    .subtext{
      margin:0 0 20px 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.4;
    }

    /* Buttons group */
    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px 18px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      font-weight:600;
      color:#fff;
      transition: transform .18s ease, box-shadow .18s ease, opacity .12s ease;
      text-decoration:none;
      user-select:none;
    }

    .btn-primary{
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      box-shadow: var(--btn-shadow);
      transform: translateY(0);
    }
    .btn-primary:hover{
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 18px 40px rgba(37,117,252,0.22);
    }

    .btn-ghost{
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      backdrop-filter: blur(4px);
    }
    .btn-ghost:hover{
      transform: translateY(-3px);
      color: #fff;
      border-color: rgba(255,255,255,0.12);
    }

    /* Right area - profile card */
    .profile {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px;
      padding:18px;
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:flex-start;
      border: 1px solid rgba(255,255,255,0.03);
    }

    .avatar{
      width:72px;
      height:72px;
      border-radius:50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      color: #fff;
      box-shadow: 0 6px 18px rgba(2,6,23,0.6);
      flex-shrink:0;
    }

    .profile-info{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .profile-info .name{
      font-weight:700;
      font-size:16px;
      color:#fff;
    }
    .profile-info .meta{
      font-size:13px;
      color:var(--muted);
    }

    /* Responsive */
    @media (max-width:880px){
      .dashboard-card{
        grid-template-columns: 1fr;
      }
      .profile{
        justify-content:space-between;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-card" role="region" aria-label="User dashboard">
    <div class="left">
      <h2 id="dashboardGreeting">Welcome</h2>
      <p class="subtext">Nice to see you. Click below to browse the library collection or log out when you're done.</p>

      <div class="actions" aria-hidden="false">
        <button class="btn btn-primary" onclick="goToHome()" title="Browse books">
          <!-- SVG icon (book) -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 6.5C3 5.67157 3.67157 5 4.5 5H19.5C20.3284 5 21 5.67157 21 6.5V18.5C21 19.3284 20.3284 20 19.5 20H4.5C3.67157 20 3 19.3284 3 18.5V6.5Z" stroke="rgba(255,255,255,0.9)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7 8H17" stroke="rgba(255,255,255,0.9)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Go check out some books
        </button>

        <button id="logout-dashboard" class="btn btn-ghost" title="Logout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 17L21 12L16 7" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M21 12H9" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13 19H6C4.89543 19 4 18.1046 4 17V7C4 5.89543 4.89543 5 6 5H13" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Logout
        </button>
      </div>
    </div>

    <div class="profile" aria-hidden="false">
      <div class="avatar" id="avatarInitial">U</div>
      <div class="profile-info">
        <div class="name" id="profileName">User</div>
        <div class="meta" id="profileMeta">Member since 2024 • Library Member</div>
      </div>
    </div>
  </div>

  <script>
    // Keep a small inline helper for the dashboard button that uses session or query param
    function goToHome() {
      const params = new URLSearchParams(window.location.search);
      const userName = params.get("name") || sessionStorage.getItem('userName') || '';
      window.location.href = `userHome.html?name=${encodeURIComponent(userName)}`;
    }

    // Populate greeting and avatar from query or session
    (function initDashboard(){
      const params = new URLSearchParams(window.location.search);
      const userName = params.get("name") || sessionStorage.getItem('userName') || 'User';
      const displayName = userName.length > 20 ? userName.slice(0,20) + '…' : userName;
      document.getElementById('dashboardGreeting').textContent = `Welcome, ${displayName}`;
      document.getElementById('profileName').textContent = displayName;
      document.getElementById('avatarInitial').textContent = (userName && userName[0]) ? userName[0].toUpperCase() : 'U';

      // Logout behavior: redirect to index
      const logoutBtn = document.getElementById('logout-dashboard');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', function(){
          sessionStorage.removeItem('userName');
          window.location.href = 'index.html';
        });
      }
    })();
  </script>

  <script src="script.js"></script>
</body>
</html>
