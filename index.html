<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Secure Login and Sign Up System" />
  <meta name="theme-color" content="#007bff" />
  <title>Login / Sign Up - Library Management</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="form-wrapper">
      <h1 id="form-title">Login</h1>

      <!-- Sign Up Form -->
      <form id="signup-form" class="hidden" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required />
          <span class="error-message" id="name-error"></span>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required />
          <span class="error-message" id="email-error"></span>
        </div>

        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender" required>
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
          <span class="error-message" id="gender-error"></span>
        </div>

        <div class="form-group">
          <label for="age">Age</label>
          <input type="number" id="age" min="1" max="120" placeholder="18" required />
          <span class="error-message" id="age-error"></span>
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="signup-password" placeholder="Min 6 characters" required />
            <button type="button" class="toggle-password" id="toggle-signup-password" aria-label="Toggle password visibility">👁️</button>
          </div>
          <span class="error-message" id="password-error"></span>
        </div>

        <button type="submit" class="btn btn-primary">Sign Up</button>
        <button type="button" class="btn btn-secondary" id="show-login">Already have an account? Login</button>
      </form>

      <!-- Login Form -->
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required />
          <span class="error-message" id="login-email-error"></span>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="login-password" placeholder="Enter your password" required />
            <button type="button" class="toggle-password" id="toggle-login-password" aria-label="Toggle password visibility">👁️</button>
          </div>
          <span class="error-message" id="login-password-error"></span>
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
        <button type="button" class="btn btn-secondary" id="show-signup">New user? Sign Up</button>
      </form>

      <!-- Welcome Message -->
      <div id="welcome-message" class="hidden">
        <div class="welcome-content">
          <h1>Welcome! 👋</h1>
          <p class="message" id="welcome-text"></p>
          <div class="user-info" id="user-info"></div>
          <button type="button" class="btn btn-primary" id="logout">Logout</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
